# ==================== SERVER CONFIGURATION ====================
server.port=8080
server.servlet.context-path=/
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost:5174,http://127.0.0.1:5173

# DevTools restart can trigger classpath introspection issues in this project
# when the backend is launched from the local Maven run target.
spring.devtools.restart.enabled=false

# ==================== DATABASE CONFIGURATION ====================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/labtestbooking?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&enabledTLSProtocols=TLSv1.2,TLSv1.3}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASS:Amanjeet@4321.}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pooling Optimization (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.auto-commit=true

# ==================== JPA & HIBERNATE CONFIGURATION ====================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=false

# Hibernate Batch Processing Optimization
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.jdbc.batch_version_data=true
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.default_batch_fetch_size=20

# Query Optimization
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.use_sql_comments=false

# SQL Initialization is disabled because Flyway and Java seeders own the schema/data lifecycle.
spring.sql.init.mode=never

# ==================== REDIS CACHE CONFIGURATION ====================
spring.cache.type=simple
spring.redis.host=${SPRING_REDIS_HOST:localhost}
spring.redis.port=${SPRING_REDIS_PORT:6379}
spring.redis.password=${SPRING_REDIS_PASSWORD:${REDIS_PASSWORD:}}
spring.redis.timeout=2000ms
spring.redis.jedis.pool.max-active=20
spring.redis.jedis.pool.max-idle=10
spring.redis.jedis.pool.min-idle=5
spring.redis.jedis.pool.max-wait=-1ms

# Cache logging
logging.level.org.springframework.cache=DEBUG
logging.level.org.springframework.data.redis=DEBUG

# ==================== JWT SECURITY CONFIGURATION ====================
jwt.secret=rrjAcuulfEbvXiv4W8rEPA==20skHyL6FUuUWzqNV2rxwQEEFg6BokakK4SRwlty
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ==================== LOGGING CONFIGURATION ====================
logging.level.root=INFO
logging.level.com.healthcare=DEBUG
logging.level.com.healthcare.labtestbooking=DEBUG
logging.level.com.healthcare.labtestbooking.security=DEBUG
logging.level.com.healthcare.labtestbooking.config=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework.security.web=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO
logging.level.org.springframework.transaction=INFO
logging.level.org.springframework.orm.jpa=INFO

# Database Query Logging (Development Only - Disabled for Performance)
# Uncomment below to debug queries:
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ==================== ERROR HANDLING ====================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on-param

# ==================== FILE UPLOAD CONFIGURATION ====================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.directory=uploads/reports/

# ==================== RATE LIMITING CONFIGURATION ====================
app.rate-limit.enabled=true
app.rate-limit.default-requests-per-minute=500
app.rate-limit.login-requests-per-minute=50
app.rate-limit.register-requests-per-minute=20
app.rate-limit.payment-requests-per-minute=30

# ==================== ASYNC CONFIGURATION ====================
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=async-

# ==================== AUDIT LOGGING ====================
logging.level.com.healthcare.labtestbooking.audit=INFO

# ==================== NOTIFICATION CONFIGURATION ====================
app.notification.email.from=no-reply@labtestbooking.local
app.notification.sms.mock=true
app.report.base-url=http://localhost:8080
app.report.pdf.directory=uploads/generated-reports
app.report.qr.base-url=http://localhost:3000/verify
app.frontend.url=http://localhost:3000
app.email.enabled=true
app.email.mock=false
app.ai.enabled=${APP_AI_ENABLED:true}
app.ai.provider=${AI_PROVIDER:gemini}
app.ai.gemini.api-key=${GEMINI_API_KEY:}
app.ai.gemini.model=${GEMINI_MODEL:gemini-1.5-flash}
app.ai.groq.enabled=${GROQ_ENABLED:false}
app.ai.groq.api-key=${GROQ_API_KEY:}
app.ai.groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}
app.payment.webhook.secret=${APP_PAYMENT_WEBHOOK_SECRET:mock_webhook_secret}
app.payment.mock-base-url=${APP_PAYMENT_MOCK_BASE_URL:http://localhost:3000/payment/mock}

