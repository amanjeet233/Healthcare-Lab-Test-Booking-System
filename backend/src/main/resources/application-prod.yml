server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  sql:
    init:
      mode: never
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:10MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:10MB}

logging:
  level:
    root: INFO
    com.healthcare.labtestbooking: INFO
    org.springframework.security: WARN

app:
  report:
    pdf:
      browser-path: ${APP_REPORT_PDF_BROWSER_PATH:}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
  security:
    h2-console:
      enabled: false
    admin-ip-whitelist:
      enabled: ${APP_ADMIN_IP_WHITELIST_ENABLED:true}
      ips: ${APP_ADMIN_IP_WHITELIST_IPS}
  features:
    api-v1-enabled: ${APP_FEATURE_API_V1_ENABLED:true}
    mock-payments-only: ${APP_FEATURE_MOCK_PAYMENTS_ONLY:true}
    publish-domain-events: ${APP_FEATURE_PUBLISH_DOMAIN_EVENTS:true}
    circuit-breaker-enabled: ${APP_FEATURE_CIRCUIT_BREAKER_ENABLED:true}
    request-correlation-enabled: ${APP_FEATURE_REQUEST_CORRELATION_ENABLED:true}
  payment:
    webhook:
      secret: ${APP_PAYMENT_WEBHOOK_SECRET}
    mock-base-url: ${APP_PAYMENT_MOCK_BASE_URL:http://localhost:3000/payment/mock}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
