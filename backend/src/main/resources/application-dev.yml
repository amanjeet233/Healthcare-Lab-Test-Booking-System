spring:
  datasource:
    url: jdbc:mysql://localhost:3306/labtestbooking?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&enabledTLSProtocols=TLSv1.2,TLSv1.3
    username: root
    password: Amanjeet@4321.
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

logging:
  level:
    root: INFO
    com.healthcare.labtestbooking: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

app:
  report:
    pdf:
      browser-path: C:/Program Files (x86)/Microsoft/Edge/Application/msedge.exe
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173
  security:
    h2-console:
      enabled: true
    admin-ip-whitelist:
      enabled: false
  features:
    api-v1-enabled: true
    mock-payments-only: true
    publish-domain-events: true
    circuit-breaker-enabled: false
    request-correlation-enabled: true
  payment:
    mock-base-url: http://localhost:3000/payment/mock

# Development-specific settings
springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
