# ==================== SWAGGER/OPENAPI DOCUMENTATION ====================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.show-extensions=true
springdoc.swagger-ui.persist-authorization=true

# ==================== SECURITY HARDENING ====================
app.security.h2-console.enabled=false
app.security.admin-ip-whitelist.enabled=${APP_ADMIN_IP_WHITELIST_ENABLED:false}
app.security.admin-ip-whitelist.ips=${APP_ADMIN_IP_WHITELIST_IPS:127.0.0.1,::1}

# ==================== FEATURE FLAGS ====================
app.features.api-v1-enabled=${APP_FEATURE_API_V1_ENABLED:true}
app.features.mock-payments-only=${APP_FEATURE_MOCK_PAYMENTS_ONLY:true}
app.features.publish-domain-events=${APP_FEATURE_PUBLISH_DOMAIN_EVENTS:true}
app.features.circuit-breaker-enabled=${APP_FEATURE_CIRCUIT_BREAKER_ENABLED:true}
app.features.request-correlation-enabled=${APP_FEATURE_REQUEST_CORRELATION_ENABLED:true}

# ==================== RESILIENCE4J ====================
resilience4j.circuitbreaker.instances.paymentGateway.failureRateThreshold=50
resilience4j.circuitbreaker.instances.paymentGateway.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.paymentGateway.slidingWindowSize=10
resilience4j.circuitbreaker.instances.paymentGateway.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.paymentGateway.permittedNumberOfCallsInHalfOpenState=3


