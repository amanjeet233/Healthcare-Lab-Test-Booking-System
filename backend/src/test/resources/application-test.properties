# ===================================================================
# Test Configuration - Using H2 In-Memory Database
# ===================================================================

# Server Configuration for tests
server.port=0

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (for debugging - can be accessed at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate Configuration for tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable SQL initialization scripts for tests
spring.sql.init.mode=never

# JWT Configuration for tests
app.jwt.secret=test-secret-key-for-testing-purposes-only-do-not-use-in-production
app.jwt.expiration-ms=3600000
app.jwt.refresh-expiration-ms=86400000

# Logging for tests
logging.level.org.springframework.security=INFO
logging.level.com.healthcare=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE